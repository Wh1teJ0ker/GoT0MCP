name: MCP Benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Install Dependencies
      run: go mod tidy

    - name: Run Benchmark
      run: |
        chmod +x scripts/benchmark.sh
        ./scripts/benchmark.sh

    - name: Upload Report
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-report
        path: test_results/
